name: MNQ Signal Bot

on:
  schedule:
    # Cada 15 minutos. GitHub Actions usa UTC y los horarios programados
    # pueden retrasarse unos minutos en momentos de alta demanda, es normal.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write   # necesario para poder hacer commit del state.json actualizado

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar bot de señales
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_bot.py

      - name: Guardar estado actualizado (commit automático)
        run: |
          git config user.name "mnq-signal-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Actualizar estado [skip ci]"
          git push
